<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Playbook Capture Studio</title>
<style>
  :root{
    --indigo:#4F46E5; --indigo-dark:#4338CA; --indigo-light:#EEF2FF;
    --teal:#0D9488; --teal-light:#ECFDF9; --teal-dark:#0F766E;
    --text:#1E293B; --text-muted:#64748B; --text-faint:#94A3B8;
    --bg:#F7F8FC; --card:#FFFFFF; --border:#E4E7EF;
    --danger:#DC2626; --danger-light:#FEF2F2;
    --radius:14px; --radius-sm:10px;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;}
  #app{min-height:100vh;display:flex;flex-direction:column;}

  /* ---------- header ---------- */
  header.topbar{display:flex;align-items:center;justify-content:space-between;
    padding:12px 24px;background:var(--card);border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:32px;height:32px;border-radius:9px;flex:none;
    background:linear-gradient(135deg,var(--teal) 0%,var(--indigo) 100%);position:relative;}
  .brand-mark::after{content:"";position:absolute;inset:8px;border-radius:5px;background:var(--card);opacity:.9;}
  .brand-name{font-weight:700;font-size:16px;letter-spacing:-.01em;}
  .mode-pill{display:flex;align-items:center;gap:6px;background:var(--indigo-light);color:var(--indigo);
    font-size:12.5px;font-weight:600;padding:5px 12px;border-radius:999px;}
  .mode-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--indigo);}
  .topbar-right{display:flex;align-items:center;gap:18px;}
  .privacy-note{display:flex;align-items:center;gap:6px;color:var(--text-muted);font-size:13px;}
  .avatar{width:32px;height:32px;border-radius:50%;background:#1E293B;color:#fff;display:flex;
    align-items:center;justify-content:center;font-size:12.5px;font-weight:700;}

  /* ---------- layout ---------- */
  .layout{flex:1;display:flex;width:100%;max-width:1440px;margin:0 auto;gap:24px;padding:24px;align-items:flex-start;}
  nav.sidenav{width:200px;flex:none;display:flex;flex-direction:column;gap:2px;}
  nav.sidenav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;
    color:var(--text-muted);text-decoration:none;font-size:14px;font-weight:500;cursor:pointer;}
  nav.sidenav a svg{flex:none;opacity:.8;}
  nav.sidenav a:hover{background:#F1F2F8;}
  nav.sidenav a.active{background:var(--indigo-light);color:var(--indigo);font-weight:700;}
  nav.sidenav a.active svg{opacity:1;}
  .nav-hint{margin-top:14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px;font-size:12.5px;color:var(--text-muted);line-height:1.5;display:flex;gap:10px;}
  .nav-hint svg{flex:none;color:var(--teal);margin-top:1px;}

  main#main{flex:1;min-width:0;display:flex;flex-direction:column;gap:18px;}
  aside.sideinfo{width:300px;flex:none;display:flex;flex-direction:column;gap:16px;}

  /* ---------- cards ---------- */
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:20px 22px;}
  .card h3{margin:0 0 12px 0;font-size:14.5px;display:flex;align-items:center;gap:8px;}
  .info-item{display:flex;gap:10px;margin-bottom:14px;}
  .info-item:last-child{margin-bottom:0;}
  .info-ic{width:30px;height:30px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;}
  .info-ic.a{background:#ECFDF9;color:var(--teal-dark);}
  .info-ic.b{background:#EEF2FF;color:var(--indigo);}
  .info-ic.c{background:#F5F3FF;color:#7C3AED;}
  .info-title{font-size:13.5px;font-weight:700;margin-bottom:2px;}
  .info-sub{font-size:12.5px;color:var(--text-muted);line-height:1.4;}

  .radio-row{display:flex;gap:10px;padding:9px 4px;border-radius:9px;cursor:pointer;align-items:flex-start;}
  .radio-row:hover{background:#F7F8FC;}
  .radio-row input{margin-top:3px;accent-color:var(--indigo);}
  .radio-title{font-size:13.5px;font-weight:600;}
  .radio-sub{font-size:12px;color:var(--text-muted);}
  .footnote{font-size:12px;color:var(--text-faint);display:flex;align-items:center;gap:6px;padding:2px 4px;}

  /* ---------- progress ---------- */
  .progress-wrap{display:flex;align-items:center;justify-content:space-between;gap:14px;}
  .progress-label{font-size:12.5px;font-weight:600;color:var(--text-muted);white-space:nowrap;}
  .progress-track{flex:1;height:6px;border-radius:99px;background:#E9EAF3;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--indigo));border-radius:99px;transition:width .3s ease;}
  .phase-pill{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
    padding:3px 9px;border-radius:99px;background:var(--teal-light);color:var(--teal-dark);white-space:nowrap;}

  /* ---------- question card ---------- */
  .q-banner{display:flex;gap:12px;}
  .ai-avatar{width:36px;height:36px;border-radius:50%;background:var(--indigo-light);color:var(--indigo);
    display:flex;align-items:center;justify-content:center;flex:none;}
  .q-banner-text .q-label{font-size:12px;font-weight:700;color:var(--indigo);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;}
  .q-banner-text .q-prompt{font-size:16.5px;font-weight:700;line-height:1.4;margin:0 0 4px;}
  .q-banner-text .q-situation{font-size:14px;color:var(--text-muted);line-height:1.5;background:#FBF8F3;border:1px solid #F1E7D2;
    padding:9px 12px;border-radius:9px;margin:6px 0 8px;}
  .q-banner-text .q-sub{font-size:13px;color:var(--text-muted);}

  .step{margin-top:20px;}
  .step-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .step-num{width:24px;height:24px;border-radius:50%;background:var(--teal-dark);color:#fff;font-size:12px;font-weight:700;
    display:flex;align-items:center;justify-content:center;flex:none;}
  .step-title{font-size:13.5px;font-weight:700;color:var(--teal-dark);}

  .chip-row{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:13px;font-weight:600;
    padding:7px 12px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:7px;user-select:none;}
  .chip:hover{border-color:#C7CBE0;}
  .chip.selected{border-color:var(--teal);background:var(--teal-light);color:var(--teal-dark);}
  .chip .badge{width:15px;height:15px;border-radius:50%;background:var(--teal);color:#fff;display:none;
    align-items:center;justify-content:center;flex:none;}
  .chip.selected .badge{display:flex;}
  .chip-other-input{border:1.5px solid var(--indigo);border-radius:9px;padding:6px 10px;font-size:13px;width:150px;outline:none;}

  .checklist-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;}
  @media(max-width:720px){.checklist-grid{grid-template-columns:1fr;}}
  .check-row{display:flex;align-items:flex-start;gap:9px;font-size:13.5px;line-height:1.4;cursor:pointer;padding:3px 0;}
  .check-row input{margin-top:2px;width:16px;height:16px;accent-color:var(--teal-dark);flex:none;}
  .check-row.auto span.tag{font-size:10.5px;color:var(--teal-dark);background:var(--teal-light);border-radius:5px;padding:1px 5px;margin-left:6px;font-weight:700;}

  textarea.freeform{width:100%;min-height:110px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
    padding:12px 14px;font-size:14px;line-height:1.55;font-family:inherit;resize:vertical;outline:none;color:var(--text);}
  textarea.freeform:focus{border-color:var(--indigo);}
  .charcount{text-align:right;font-size:11.5px;color:var(--text-faint);margin-top:4px;}
  .helper-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .helper-btn{display:flex;align-items:center;gap:6px;border:1.5px solid var(--teal);background:#fff;color:var(--teal-dark);
    font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:8px;cursor:pointer;}
  .helper-btn:hover{background:var(--teal-light);}
  .hint-box{margin-top:10px;background:#FFFBEB;border:1px solid #FDE68A;color:#92400E;font-size:13px;
    padding:10px 12px;border-radius:9px;line-height:1.5;}

  .summary-box{margin-top:20px;background:var(--indigo-light);border:1px solid #D9DEFB;border-radius:var(--radius-sm);
    padding:14px 16px;}
  .summary-head{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--indigo);margin-bottom:6px;}
  .summary-text{font-size:14px;line-height:1.55;color:#312E81;}
  .summary-text[contenteditable="true"]{outline:2px dashed var(--indigo);padding:4px 6px;border-radius:6px;background:#fff;}

  .action-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;}
  .btn{border:none;border-radius:9px;font-size:13.5px;font-weight:700;padding:10px 16px;cursor:pointer;
    display:flex;align-items:center;gap:7px;}
  .btn-primary{background:var(--indigo);color:#fff;}
  .btn-primary:hover{background:var(--indigo-dark);}
  .btn-primary:disabled{background:#C7C9E8;cursor:not-allowed;}
  .btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text);}
  .btn-outline:hover{border-color:#C7CBE0;}
  .btn-ghost{background:transparent;color:var(--text-muted);}
  .btn-ghost:hover{color:var(--text);}
  .btn-danger{background:var(--danger-light);color:var(--danger);}
  .btn-danger:hover{background:#FEE2E2;}
  .warn-inline{font-size:12px;color:var(--danger);margin-top:6px;}

  /* transition / complete screens */
  .center-card{text-align:center;padding:44px 30px;}
  .center-card .big-ic{width:56px;height:56px;border-radius:50%;background:var(--teal-light);color:var(--teal-dark);
    display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
  .center-card .big-ic.spin{animation:spcs-spin 1.1s linear infinite;}
  @keyframes spcs-spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  .center-card h2{margin:0 0 8px;font-size:19px;}
  .center-card p{margin:0 auto 20px;max-width:440px;color:var(--text-muted);font-size:14px;line-height:1.5;}
  .center-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}

  .stat-row{display:flex;gap:14px;justify-content:center;margin:18px 0;flex-wrap:wrap;}
  .stat{background:#F7F8FC;border:1px solid var(--border);border-radius:12px;padding:12px 20px;min-width:110px;}
  .stat .num{font-size:22px;font-weight:800;color:var(--indigo);}
  .stat .lbl{font-size:11.5px;color:var(--text-muted);font-weight:600;}

  .recap-section{text-align:left;margin-top:22px;}
  .recap-section h4{font-size:13px;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);margin:22px 0 10px;}
  .recap-item{border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;font-size:13.5px;line-height:1.5;}
  .recap-item .recap-q{font-weight:700;margin-bottom:3px;}
  .recap-item .recap-s{color:var(--text-muted);}
  .recap-checklist{display:flex;flex-wrap:wrap;gap:8px;}
  .recap-chip{background:var(--teal-light);color:var(--teal-dark);font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:8px;}

  /* other views */
  .page-title{font-size:19px;font-weight:800;margin:0 0 2px;}
  .page-sub{font-size:13.5px;color:var(--text-muted);margin:0 0 6px;}
  .session-card{border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:12px;background:#fff;}
  .session-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
  .session-date{font-weight:700;font-size:14px;}
  .session-meta{font-size:12.5px;color:var(--text-muted);margin-top:2px;}
  .badge-privacy{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:#F1F2F8;color:var(--text-muted);white-space:nowrap;}
  .session-actions{display:flex;gap:8px;margin-top:10px;}
  .session-detail{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;}
  .empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);}
  .empty-state svg{margin-bottom:10px;color:var(--text-faint);}

  .settings-row{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;max-width:420px;}
  .settings-row label{font-size:13px;font-weight:700;}
  .settings-row input[type=text]{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;outline:none;}
  .settings-row input[type=text]:focus{border-color:var(--indigo);}
  .settings-row select{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;background:#fff;}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;
    font-size:13px;font-weight:600;padding:10px 18px;border-radius:9px;box-shadow:0 6px 18px rgba(0,0,0,.2);
    opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

  .draft-banner{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#FFFBEB;
    border:1px solid #FDE68A;border-radius:12px;padding:12px 16px;flex-wrap:wrap;}
  .draft-banner .txt{font-size:13.5px;color:#92400E;}
  .draft-banner .txt b{display:block;font-size:14px;margin-bottom:2px;}

  @media(max-width:980px){
    .layout{flex-direction:column;}
    nav.sidenav{width:100%;flex-direction:row;flex-wrap:wrap;}
    aside.sideinfo{width:100%;}
  }
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">Sales Playbook Capture Studio</div>
      <div class="mode-pill" id="modePill"><span class="dot"></span><span>Interview Mode</span></div>
    </div>
    <div class="topbar-right">
      <div class="privacy-note">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        <span>Private until you review and share</span>
      </div>
      <div class="avatar" id="avatarBadge">R</div>
    </div>
  </header>

  <div class="layout">
    <nav class="sidenav" id="sidenav"></nav>
    <main id="main"></main>
    <aside class="sideinfo" id="sideinfo"></aside>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================= ICONS ============================= */
const ICON = {
  interview:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
  sessions:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>',
  knowledge:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
  settings:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  sparkle:'<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 5.6L19.4 9.4 13.8 11.2 12 17l-1.8-5.8L4.6 9.4l5.6-1.8L12 2z"/></svg>',
  sparkleSm:'<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 5.6L19.4 9.4 13.8 11.2 12 17l-1.8-5.8L4.6 9.4l5.6-1.8L12 2z"/></svg>',
  check:'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>',
  checkLg:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
  example:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>',
  steps:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>',
  mic:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>',
  help:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 1 1 5.83 1c0 2-3 2-3 4"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  arrow:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>',
  trash:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  download:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  lock:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>',
  bulb:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.3h6c0-1 .4-1.8 1-2.3A7 7 0 0 0 12 2z"/></svg>',
};

/* ============================= PERSONA & PROCESS BACKBONE =============================
   Grounded in Sable's own diagnostic work (the Enrich end-to-end revenue journey and the
   "Sales Knowledge" tacit-knowledge gap), not invented generically. This is what Max meant
   by building around a specific persona first, with the interview structured against a real
   process rather than a generic reused question set. */
const PERSONA = {
  id: 'salesperson',
  label: 'Salesperson',
  description: "Front-line sales rep who owns a lead from assignment through close and handoff.",
};

// Sable's documented end-to-end revenue journey. Kept here so both the scripted questions
// below and the future adaptive engine stay anchored to real process stages instead of
// wandering. See ADAPTIVE_QUESTIONS_SPEC.md for how this gets used once live model calls
// are wired in.

/* Randomly draws `n` questions from `bank`, trying to spread across distinct topic
   families first (so a session doesn't accidentally land on three pricing questions and
   skip follow-up entirely), then fills any remainder randomly if `n` exceeds the number
   of distinct families available. */
function pickSubset(bank, n){
  const groups = {};
  bank.forEach(q=>{ (groups[q.family] = groups[q.family]||[]).push(q); });
  const familyKeys = Object.keys(groups).sort(()=>Math.random()-0.5);
  const picked = []; const used = new Set();
  for(const key of familyKeys){
    if(picked.length>=n) break;
    const options = groups[key];
    const choice = options[Math.floor(Math.random()*options.length)];
    picked.push(choice); used.add(choice.id);
  }
  if(picked.length < n){
    const remaining = bank.filter(q=>!used.has(q.id)).sort(()=>Math.random()-0.5);
    for(const q of remaining){
      if(picked.length>=n) break;
      picked.push(q); used.add(q.id);
    }
  }
  return picked.sort(()=>Math.random()-0.5);
}

/* ============================= QUESTION ENGINE =============================
   Swappable by design: scripted by default, adaptive once a backend is deployed and
   turned on in Settings (Backend URL + "Use adaptive questions"). The backend holds the
   GLM key server-side and does the actual model call — see /sales-playbook-backend and
   ADAPTIVE_QUESTIONS_SPEC.md. Nothing else in this file needs to change to switch modes,
   since every caller goes through QuestionEngine instead of indexing the arrays directly. */
const QuestionEngine = {
  async getQuestion(phase, index){
    const list = phase==='interview' ? state.interviewQuestions : state.scenarioQuestions;
    const adaptiveOn = store.settings.adaptiveMode && store.settings.backendUrl;
    if(!adaptiveOn){
      return list[index] || null;
    }
    try{
      const res = await fetch(store.settings.backendUrl.replace(/\/$/,'') + '/api/generate-question', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          persona: PERSONA, stages: REVENUE_JOURNEY_STAGES,
          transcriptSoFar: state.sessionEntries, phase, index,
        }),
      });
      const data = await res.json();
      if(!res.ok || !data.ok){
        toast('Adaptive question generation failed — using the scripted question instead.');
        return list[index] || null;
      }
      if(data.done){
        return null; // signals "no more ground to cover" — advanceQuestion() treats this like reaching the end of the list
      }
      return data.question;
    }catch(e){
      toast('Could not reach the backend — using the scripted question instead.');
      return list[index] || null;
    }
  }
};

    }
  }catch(e){}
  return {settings:{name:'Rich', defaultPrivacy:'private', backendUrl:'', adaptiveMode:true, adminToken:''}, sessions:[]};
}
function saveStore(s){ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }
function loadDraft(){
  try{ const raw=localStorage.getItem(DRAFT_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return null;
}
function saveDraft(d){ localStorage.setItem(DRAFT_KEY, JSON.stringify(d)); }
function clearDraft(){ localStorage.removeItem(DRAFT_KEY); }

let store = loadStore();
// When this file is served over http/https (i.e. the hosted link, not a local double-clicked
// file), it's being served BY the backend — so default Backend URL to "wherever this page came
// from" instead of making every employee paste it in manually. Opening the raw .html file
// locally (file://) skips this, since there's no backend colocated with it in that case.
if(!store.settings.backendUrl && location.protocol !== 'file:'){
  store.settings.backendUrl = location.origin;
  saveStore(store);
}

function freshEntryFor(q){
  const chips = q.chips || (q.type==='scenario' ? SCENARIO_CHIPS : []);
  const bank = q.checklist || (q.type==='scenario' ? SCENARIO_CHECKLIST : []);
  return {
    questionId: q.id || ('adaptive_'+Date.now()), type:q.type, prompt:q.prompt, situation:q.situation||null, stage:q.stage||null,
    chipsAvailable: chips.slice(),
    chipsSelected:[], otherText:'',
    checklist: bank.map(c=>({label:c.label, kw:c.kw, checked:false, userTouched:false})),
    freeform:'', summary:'', summaryEdited:false, hintOpen:false, skipped:false,
  };
}

function defaultState(){
  // Fresh random draw for this session's 8 interview + 3 scenario questions, so
  // back-to-back employees don't get the identical set in the identical order.
  const interviewQuestions = pickSubset(INTERVIEW_BANK, INTERVIEW_COUNT);
  const scenarioQuestions = pickSubset(SCENARIO_BANK, SCENARIO_COUNT);
  return {
    view:'interview', phase:'interview', qIndex:0,
    privacy: store.settings.defaultPrivacy || 'private',
    sessionEntries:[],
    interviewQuestions, scenarioQuestions,
    currentQuestionData: interviewQuestions[0],
    currentEntry: freshEntryFor(interviewQuestions[0]),
    startedAt: new Date().toISOString(),
    resumeBannerDismissed:false,
    lastSavedSessionId:null,
    loadingNextQuestion:false,
  };
}

let state = defaultState();
let draftAvailable = !!loadDraft();

/* ============================= UTIL ============================= */
function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(window.__toastT); window.__toastT=setTimeout(()=>t.classList.remove('show'), 2200);
}
function currentQuestion(){
  return state.currentQuestionData || null;
}
function totalQuestions(){
  return state.interviewQuestions.length + state.scenarioQuestions.length;
}
function questionNumberOverall(){
  if(state.phase==='interview') return state.qIndex+1;
  if(state.phase==='scenario') return state.interviewQuestions.length + state.qIndex + 1;
  return totalQuestions();
}

function autoCheckKeywords(entry){
  const text=(entry.freeform||'').toLowerCase();
  entry.checklist.forEach(item=>{
    if(item.userTouched) return;
    const hit = item.kw.some(k=>text.includes(k));
    item.checked = hit;
  });
}

function joinNatural(arr){
  if(arr.length===0) return '';
  if(arr.length===1) return arr[0];
  if(arr.length===2) return arr[0]+' and '+arr[1];
  return arr.slice(0,-1).join(', ')+', and '+arr[arr.length-1];
}

function buildSummary(entry){
  const checked = entry.checklist.filter(c=>c.checked).map(c=>c.label.replace(/^I /,'').replace(/^I'm/,'are'));
  const chips = entry.chipsSelected.filter(c=>c!=='Other').concat(entry.otherText?[entry.otherText]:[]);
  const excerpt = (entry.freeform||'').trim().split(/\s+/).slice(0,22).join(' ');
  let opening = entry.type==='scenario' ? "In this situation, you say you'd " : "You have a process where you ";
  let body='';
  if(checked.length){
    body = joinNatural(checked)+'.';
  } else if(excerpt){
    body = 'handle it based on: "'+excerpt+(entry.freeform.trim().split(/\s+/).length>22?'…':'')+'"';
  } else {
    body = "haven't described this one yet.";
  }
  let trigger='';
  if(chips.length){
    trigger = entry.type==='scenario'
      ? ' Your first move leans toward '+joinNatural(chips.map(c=>c.toLowerCase()))+'.'
      : ' Context that applies here: '+joinNatural(chips.map(c=>c.toLowerCase()))+'.';
  }
  return (opening+body+trigger).trim();
}

function refreshSummary(entry){
  if(entry.summaryEdited) return;
  entry.summary = buildSummary(entry);
}

/* ============================= RENDER: SHELL ============================= */

  renderSidenav();

  const pill = document.getElementById('modePill');

}

function privacyRow(v){

/* ============================= RENDER: MAIN ============================= */
function renderMain(){
  const main=document.getElementById('main');
  if(state.view==='sessions'){ main.innerHTML = renderSessionsView(); wireSessionsView(); return; }
  if(state.view==='knowledge'){ main.innerHTML = renderKnowledgeView(); wireKnowledgeView(); return; }
  if(state.view==='team'){ renderTeamView(); return; }
  if(state.view==='settings'){ main.innerHTML = renderSettingsView(); wireSettingsView(); return; }

  // interview / scenario / transition / complete
  let html='';
  if(draftAvailable && !state.resumeBannerDismissed && state.sessionEntries.length===0 && state.qIndex===0 && state.phase==='interview'){
    html += `<div class="draft-banner">
      <div class="txt"><b>You have an interview in progress</b>Pick up where you left off, or start fresh.</div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" id="resumeBtn">Resume session</button>
        <button class="btn btn-outline" id="discardBtn">Start over</button>
      </div></div>`;
  }
  if(state.phase==='interview' || state.phase==='scenario'){
    html += renderProgress() + (state.loadingNextQuestion ? renderLoadingCard() : renderQuestionCard());
  } else if(state.phase==='transition'){
    html += renderTransitionCard();
  } else if(state.phase==='complete'){
    html += renderCompleteCard();
  }
  document.getElementById('main').innerHTML = html;
  wireInterviewView();
}

function renderProgress(){
  const n = questionNumberOverall();
  const total = totalQuestions();
  const pct = Math.round(((n-1)/total)*100);
  const phaseLabel = state.phase==='interview' ? 'Interview' : 'Hypothetical Scenario';
  return `<div class="card progress-wrap">
    <div class="progress-label">Question ${n} of ${total}</div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="phase-pill">${phaseLabel}</div>
  </div>`;
}

  return `<div class="card center-card">

    <div class="big-ic">${ICON.checkLg}</div>

/* ============================= WIRE: INTERVIEW ============================= */
function saveCurrentDraft(){
  if(state.phase!=='interview' && state.phase!=='scenario') { clearDraft(); return; }
  saveDraft({phase:state.phase, qIndex:state.qIndex, sessionEntries:state.sessionEntries,
    currentEntry:state.currentEntry, currentQuestionData:state.currentQuestionData,
    interviewQuestions:state.interviewQuestions, scenarioQuestions:state.scenarioQuestions,
    privacy:state.privacy, startedAt:state.startedAt});
  draftAvailable=true;
}

function wireInterviewView(){
  if(state.loadingNextQuestion) return; // loading card has nothing to wire up
  const resumeBtn=document.getElementById('resumeBtn');
  if(resumeBtn){
    resumeBtn.addEventListener('click', ()=>{
      const d=loadDraft();
      if(d){ state.phase=d.phase; state.qIndex=d.qIndex; state.sessionEntries=d.sessionEntries;
        state.currentEntry=d.currentEntry; state.privacy=d.privacy; state.startedAt=d.startedAt;
        // Resuming keeps the same randomly-picked subset the session started with —
        // falls back to a fresh pick only for old drafts saved before this existed.
        state.interviewQuestions = d.interviewQuestions || pickSubset(INTERVIEW_BANK, INTERVIEW_COUNT);
        state.scenarioQuestions = d.scenarioQuestions || pickSubset(SCENARIO_BANK, SCENARIO_COUNT);
        state.currentQuestionData = d.currentQuestionData ||
          (d.phase==='interview' ? state.interviewQuestions[d.qIndex] : state.scenarioQuestions[d.qIndex]); }
      state.resumeBannerDismissed=true; render();
    });
    document.getElementById('discardBtn').addEventListener('click', ()=>{
      clearDraft(); draftAvailable=false; state=defaultState(); state.resumeBannerDismissed=true; render();
    });
  }

  if(state.phase==='transition'){
    const s=document.getElementById('btnStartScenarios');
    if(s) s.addEventListener('click', ()=>{ state.phase='scenario'; state.qIndex=0;
      state.currentQuestionData=state.scenarioQuestions[0]; state.currentEntry=freshEntryFor(state.scenarioQuestions[0]);
      saveCurrentDraft(); render(); });
    const f=document.getElementById('btnFinishEarly');
    if(f) f.addEventListener('click', ()=>{ state.phase='complete'; render(); });
    return;
  }
  if(state.phase==='complete'){
    const sv=document.getElementById('btnSaveSession');
    if(sv) sv.addEventListener('click', saveSession);
    const so=document.getElementById('btnStartOver');
    if(so) so.addEventListener('click', ()=>{ clearDraft(); draftAvailable=false; state=defaultState(); render(); });
    return;
  }

  const entry = state.currentEntry;

  document.querySelectorAll('[data-chip]').forEach(el=>el.addEventListener('click', ()=>{
    const val = el.getAttribute('data-chip');
    const idx = entry.chipsSelected.indexOf(val);
    if(idx>-1) entry.chipsSelected.splice(idx,1); else entry.chipsSelected.push(val);
    refreshSummary(entry); saveCurrentDraft(); render();
  }));
  const otherInput=document.getElementById('otherInput');
  if(otherInput) otherInput.addEventListener('input', e=>{ entry.otherText=e.target.value; refreshSummary(entry); saveCurrentDraft(); });

  document.querySelectorAll('[data-check]').forEach(el=>el.addEventListener('change', e=>{
    const i=+el.getAttribute('data-check');
    entry.checklist[i].checked = e.target.checked;
    entry.checklist[i].userTouched = true;
    refreshSummary(entry); saveCurrentDraft(); render();
  }));

  const box=document.getElementById('freeformBox');
  let debounceT;
  box.addEventListener('input', e=>{
    entry.freeform = e.target.value;
    document.getElementById('charcount').textContent = entry.freeform.length;
    clearTimeout(debounceT);
    debounceT=setTimeout(()=>{
      autoCheckKeywords(entry); refreshSummary(entry); saveCurrentDraft();
      document.getElementById('checkGrid').innerHTML = entry.checklist.map((c,i)=>`
        <label class="check-row ${!c.userTouched && c.checked ? 'auto':''}">
          <input type="checkbox" data-check="${i}" ${c.checked?'checked':''}>
          <span>${escapeHtml(c.label)}${(!c.userTouched && c.checked)?'<span class="tag">auto</span>':''}</span>
        </label>`).join('');
      document.querySelectorAll('[data-check]').forEach(el=>el.addEventListener('change', ev=>{
        const i=+el.getAttribute('data-check');
        entry.checklist[i].checked = ev.target.checked; entry.checklist[i].userTouched = true;
        refreshSummary(entry); saveCurrentDraft(); render();
      }));
      if(!entry.summaryEdited) document.getElementById('summaryText').textContent = entry.summary;
      const btn=document.getElementById('btnContinue');
      if(btn) btn.disabled = entry.freeform.trim().length<15;
    }, 350);
  });

  const q=currentQuestion();
  document.getElementById('btnExample').addEventListener('click', ()=>{
    if(entry.freeform.trim() && !confirm('Replace your current answer with an example?')) return;
    entry.freeform = q.example; box.value=q.example;
    document.getElementById('charcount').textContent = entry.freeform.length;
    autoCheckKeywords(entry); refreshSummary(entry); saveCurrentDraft(); render();
  });
  document.getElementById('btnSteps').addEventListener('click', ()=>{
    const parts = entry.freeform.split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(Boolean);
    if(parts.length<2){ toast('Add a bit more detail first — need at least two sentences to split into steps.'); return; }
    entry.freeform = parts.map((p,i)=>`${i+1}. ${p}`).join('\n');
    box.value=entry.freeform; document.getElementById('charcount').textContent = entry.freeform.length;
    saveCurrentDraft(); render();
  });
  document.getElementById('btnVoice').addEventListener('click', ()=>startVoice(entry, box));
  document.getElementById('btnHint').addEventListener('click', ()=>{ entry.hintOpen = !entry.hintOpen; render(); });

  const summaryEl=document.getElementById('summaryText');
  document.getElementById('btnEditSummary').addEventListener('click', ()=>{
    if(entry.summaryEdited){
      entry.summary = summaryEl.textContent.trim(); entry.summaryEdited=true;
    } else {
      entry.summaryEdited = true;
    }
    saveCurrentDraft(); render();
    if(entry.summaryEdited){ const s=document.getElementById('summaryText'); s.focus(); }
  });

  const contBtn=document.getElementById('btnContinue');
  contBtn.disabled = entry.freeform.trim().length<15;
  contBtn.addEventListener('click', ()=>{
    if(entry.freeform.trim().length<15){ const w=document.getElementById('warnInline'); if(w) w.style.display='block'; return; }
    if(entry.summaryEdited) entry.summary = document.getElementById('summaryText').textContent.trim();
    advanceQuestion(entry);
  });
  document.getElementById('btnSkip').addEventListener('click', ()=>{
    entry.skipped = true; advanceQuestion(entry);
  });
}

async function advanceQuestion(entry){
  // Guard against double-submits: without this, clicking Continue again while a slow
  // adaptive call is still in flight would push the same entry twice and fire a second
  // concurrent request — which is exactly what produced duplicate entries in testing.
  if(state.loadingNextQuestion) return;
  state.loadingNextQuestion = true;
  render(); // show the loading card immediately, before the (possibly slow) await below

  state.sessionEntries.push(entry);
  const list = state.phase==='interview' ? state.interviewQuestions : state.scenarioQuestions;
  const hasMoreScripted = state.qIndex+1 < list.length;
  let q = null;
  if(hasMoreScripted){
    state.qIndex += 1;
    q = await QuestionEngine.getQuestion(state.phase, state.qIndex);
  }
  state.loadingNextQuestion = false;
  if(q){
    state.currentQuestionData = q;
    state.currentEntry = freshEntryFor(q);
  } else if(state.phase==='interview'){
    state.phase='transition';
  } else {
    state.phase='complete';
  }
  saveCurrentDraft(); render();
}

function startVoice(entry, box){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast("Voice input isn't supported in this browser — type your answer instead."); return; }
  try{
    const rec = new SR();
    rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=1;
    toast('Listening… speak your answer.');
    rec.onresult = (e)=>{
      const text = e.results[0][0].transcript;
      entry.freeform = (entry.freeform ? entry.freeform+' ' : '') + text;
      box.value = entry.freeform;
      document.getElementById('charcount').textContent = entry.freeform.length;
      autoCheckKeywords(entry); refreshSummary(entry); saveCurrentDraft(); render();
    };
    rec.onerror = ()=> toast("Couldn't capture audio — try typing instead.");
    rec.start();
  }catch(err){ toast("Voice input isn't available right now — type your answer instead."); }
}

async function saveSession(){
  const session = {
    id: 's_'+Date.now(), startedAt: state.startedAt, completedAt: new Date().toISOString(),
    privacy: state.privacy, entries: state.sessionEntries,
  };
  store.sessions.unshift(session);
  store.settings.defaultPrivacy = state.privacy;
  saveStore(store);
  clearDraft(); draftAvailable=false;

  // Honor the privacy choice: "Keep private" means exactly that — nothing leaves this
  // browser. Only anon/manager/team selections get sent to the shared backend, and
  // "anon" strips the name before sending.
  if(session.privacy !== 'private' && store.settings.backendUrl){
    try{
      await fetch(store.settings.backendUrl.replace(/\/$/,'') + '/api/sessions', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          ...session,
          employeeName: session.privacy==='anon' ? 'Anonymous' : (store.settings.name||'Unknown'),
        }),
      });
      toast('Session saved locally and sent to the shared backend.');
    }catch(e){
      toast('Saved locally, but could not reach the backend to share it.');
    }
  } else {
    toast('Session saved to My Sessions.');
  }

  state = defaultState();
  state.view='sessions';
  render();
}

/* ============================= VIEW: SESSIONS ============================= */
function renderSessionsView(){
  if(!store.sessions.length){
    return `<div class="card empty-state">${ICON.sessions.replace('width="16" height="16"','width="34" height="34"')}
      <div style="font-weight:700;margin-bottom:4px;">No sessions yet</div>
      <div>Complete an interview to see your captured process drafts here.</div>
      <div style="margin-top:16px;"><button class="btn btn-primary" id="goInterview">Start an interview ${ICON.arrow}</button></div>
    </div>`;
  }
  return `<div class="page-title">My Sessions</div>
    <div class="page-sub">${store.sessions.length} session${store.sessions.length===1?'':'s'} captured</div>
    ${store.sessions.map((s,i)=>sessionCard(s,i)).join('')}`;
}
function sessionCard(s, i){
  const date = new Date(s.completedAt);
  const answered = s.entries.filter(e=>!e.skipped).length;
  const privacyLabel = {private:'Kept private', anon:'Shared anonymously', manager:'Shared with manager', team:'In team knowledge base'}[s.privacy] || 'Private';
  return `<div class="session-card">
    <div class="session-card-top">
      <div><div class="session-date">${date.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})} · ${date.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})}</div>
      <div class="session-meta">${answered} of ${s.entries.length} questions answered</div></div>
      <div class="badge-privacy">${privacyLabel}</div>
    </div>
    <div class="session-actions">
      <button class="btn btn-outline" data-toggle="${i}">View details</button>
      <button class="btn btn-danger" data-del="${i}">${ICON.trash} Delete</button>
    </div>
    <div class="session-detail" id="detail-${i}" style="display:none;">
      ${s.entries.map(e=>`<div class="recap-item"><div class="recap-q">${escapeHtml(e.prompt || e.situation)}</div><div class="recap-s">${e.skipped?'<i>Skipped</i>':escapeHtml(e.summary)}</div></div>`).join('')}
    </div>
  </div>`;
}
function wireSessionsView(){
  const go=document.getElementById('goInterview');
  if(go) go.addEventListener('click', ()=>{ state.view='interview'; render(); });
  document.querySelectorAll('[data-toggle]').forEach(b=>b.addEventListener('click', ()=>{
    const i=b.getAttribute('data-toggle'); const d=document.getElementById('detail-'+i);
    d.style.display = d.style.display==='none' ? 'block' : 'none';
  }));
  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>{
    const i=+b.getAttribute('data-del');
    if(!confirm('Delete this session? This can\'t be undone.')) return;
    store.sessions.splice(i,1); saveStore(store); render();
  }));
}

/* ============================= VIEW: KNOWLEDGE ============================= */
function renderKnowledgeView(){
  const allEntries = store.sessions.flatMap(s=>s.entries.map(e=>({...e, sessionDate:s.completedAt})));
  if(!allEntries.length){
    return `<div class="card empty-state">${ICON.knowledge.replace('width="16" height="16"','width="34" height="34"')}
      <div style="font-weight:700;margin-bottom:4px;">No knowledge captured yet</div>
      <div>Once you complete sessions, your consolidated process notes and checklist show up here.</div></div>`;
  }
  const interview = allEntries.filter(e=>e.type==='interview' && !e.skipped);
  const scenario = allEntries.filter(e=>e.type==='scenario' && !e.skipped);
  const checklistSet=new Map();
  allEntries.forEach(e=>e.checklist.filter(c=>c.checked).forEach(c=>checklistSet.set(c.label,true)));

  return `<div class="page-title">My Knowledge</div>
    <div class="page-sub">Everything you've captured across ${store.sessions.length} session${store.sessions.length===1?'':'s'}, in one place.</div>
    <div class="card">
      <h3>${ICON.download.replace('width="13" height="13"','width="15" height="15"')} Export</h3>
      <div class="info-sub" style="margin-bottom:10px;">Download everything as a plain text file.</div>
      <button class="btn btn-outline" id="exportBtn">${ICON.download} Export as text</button>
    </div>
    <div class="card">
      <h3>Process draft (${interview.length})</h3>
      ${interview.map(e=>`<div class="recap-item"><div class="recap-q">${escapeHtml(e.prompt)}</div><div class="recap-s">${escapeHtml(e.summary)}</div></div>`).join('') || '<div class="recap-s">None yet.</div>'}
    </div>
    <div class="card">
      <h3>Consolidated checklist (${checklistSet.size})</h3>
      <div class="recap-checklist">${[...checklistSet.keys()].map(l=>`<span class="recap-chip">${escapeHtml(l)}</span>`).join('') || '<span class="recap-s">None yet.</span>'}</div>
    </div>
    <div class="card">
      <h3>Scenario notes (${scenario.length})</h3>
      ${scenario.map(e=>`<div class="recap-item"><div class="recap-q">${escapeHtml(e.situation)}</div><div class="recap-s">${escapeHtml(e.summary)}</div></div>`).join('') || '<div class="recap-s">None yet.</div>'}
    </div>`;
}
function wireKnowledgeView(){
  const exp=document.getElementById('exportBtn');
  if(!exp) return;
  exp.addEventListener('click', ()=>{
    const allEntries = store.sessions.flatMap(s=>s.entries);
    let text = `SALES PLAYBOOK — ${store.settings.name||'Employee'}\nExported ${new Date().toLocaleString()}\n\n`;
    text += '=== PROCESS DRAFT ===\n';
    allEntries.filter(e=>e.type==='interview'&&!e.skipped).forEach(e=>{ text+=`\nQ: ${e.prompt}\nA: ${e.summary}\n`; });
    text += '\n=== CHECKLIST ===\n';
    const set=new Map(); allEntries.forEach(e=>e.checklist.filter(c=>c.checked).forEach(c=>set.set(c.label,true)));
    [...set.keys()].forEach(l=>text+=`- ${l}\n`);
    text += '\n=== SCENARIO NOTES ===\n';
    allEntries.filter(e=>e.type==='scenario'&&!e.skipped).forEach(e=>{ text+=`\nSituation: ${e.situation}\nResponse: ${e.summary}\n`; });
    const blob = new Blob([text], {type:'text/plain'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download = 'sales-playbook-'+(store.settings.name||'export').toLowerCase().replace(/\s+/g,'-')+'.txt';
    a.click();
  });
}

/* ============================= VIEW: TEAM RESULTS =============================
   Reads every employee's saved sessions from the backend (not localStorage) — this is
   the view that makes results visible to Max instead of stuck in each person's browser.
   Requires Backend URL + Admin Token to be set in Settings first. */
async function renderTeamView(){
  const main=document.getElementById('main');
  if(!store.settings.backendUrl){
    main.innerHTML = `<div class="card empty-state">${ICON.knowledge.replace('width="16" height="16"','width="34" height="34"')}
      <div style="font-weight:700;margin-bottom:4px;">No backend connected yet</div>
      <div>Set a Backend URL in Settings to see everyone's answers in one place, instead of just what's saved on this browser.</div>
      <div style="margin-top:16px;"><button class="btn btn-primary" id="goSettingsFromTeam">Go to Settings ${ICON.arrow}</button></div>
    </div>`;
    document.getElementById('goSettingsFromTeam').addEventListener('click', ()=>{ state.view='settings'; render(); });
    return;
  }
  main.innerHTML = `<div class="card"><div class="page-sub">Loading team results…</div></div>`;
  try{
    const res = await fetch(store.settings.backendUrl.replace(/\/$/,'') + '/api/sessions', {
      headers:{'x-admin-token': store.settings.adminToken||''},
    });
    const data = await res.json();
    if(!res.ok || !data.ok){
      main.innerHTML = `<div class="card empty-state"><div style="font-weight:700;margin-bottom:4px;">Couldn't load team results</div>
        <div>${escapeHtml(data.error || ('HTTP '+res.status))}</div>
        <div style="margin-top:6px;">Check the Admin Token in Settings matches what's configured on the server.</div></div>`;
      return;
    }
    const sessions = data.sessions || [];
    if(!sessions.length){
      main.innerHTML = `<div class="card empty-state"><div style="font-weight:700;margin-bottom:4px;">No sessions saved yet</div>
        <div>Once employees complete interviews, their answers will show up here.</div></div>`;
      return;
    }
    main.innerHTML = `<div class="page-title">Team Results</div>
      <div class="page-sub">${sessions.length} session${sessions.length===1?'':'s'} from the team, pulled live from the backend.</div>
      ${sessions.map((s,i)=>`
        <div class="session-card">
          <div class="session-card-top">
            <div><div class="session-date">${escapeHtml(s.employeeName||'Unknown')} — ${new Date(s.completedAt).toLocaleDateString()}</div>
            <div class="session-meta">${(s.entries||[]).filter(e=>!e.skipped).length} of ${(s.entries||[]).length} questions answered</div></div>
            <div class="badge-privacy">${escapeHtml(s.privacy||'private')}</div>
          </div>
          <div class="session-actions"><button class="btn btn-outline" data-team-toggle="${i}">View details</button></div>
          <div class="session-detail" id="team-detail-${i}" style="display:none;">
            ${(s.entries||[]).map(e=>`<div class="recap-item"><div class="recap-q">${e.stage?escapeHtml(e.stage)+' — ':''}${escapeHtml(e.prompt||e.situation||'')}</div><div class="recap-s">${e.skipped?'<i>Skipped</i>':escapeHtml(e.summary||'')}</div></div>`).join('')}
          </div>
        </div>`).join('')}`;
    document.querySelectorAll('[data-team-toggle]').forEach(b=>b.addEventListener('click', ()=>{
      const i=b.getAttribute('data-team-toggle'); const d=document.getElementById('team-detail-'+i);
      d.style.display = d.style.display==='none' ? 'block' : 'none';
    }));
  }catch(e){
    main.innerHTML = `<div class="card empty-state"><div style="font-weight:700;margin-bottom:4px;">Couldn't reach the backend</div>
      <div>${escapeHtml(String(e.message||e))}</div></div>`;
  }
}

/* ============================= VIEW: SETTINGS ============================= */
function renderSettingsView(){
  return `<div class="page-title">Settings</div>
    <div class="page-sub">Local to this browser — nothing here is sent anywhere.</div>
    <div class="card">
      <div class="settings-row">
        <label>Display name</label>
        <input type="text" id="nameInput" value="${escapeHtml(store.settings.name||'')}" placeholder="Your name">
      </div>
      <div class="settings-row">
        <label>Default privacy for new sessions</label>
        <select id="privacySelect">
          <option value="private" ${store.settings.defaultPrivacy==='private'?'selected':''}>Keep private</option>
          <option value="anon" ${store.settings.defaultPrivacy==='anon'?'selected':''}>Share anonymously</option>
          <option value="manager" ${store.settings.defaultPrivacy==='manager'?'selected':''}>Share with manager</option>
          <option value="team" ${store.settings.defaultPrivacy==='team'?'selected':''}>Add to team knowledge base</option>
        </select>
      </div>
    </div>
    <div class="card">
      <h3>Backend &amp; adaptive questions</h3>
      <div class="info-sub" style="margin-bottom:12px;">Connects this tool to the shared backend so sessions are saved centrally and (once turned on) follow-up questions are generated live instead of scripted.</div>
      <div class="settings-row">
        <label>Backend URL</label>
        <input type="text" id="backendUrlInput" value="${escapeHtml(store.settings.backendUrl||'')}" placeholder="https://your-app.onrender.com">
      </div>
      <div class="settings-row">
        <label>Admin token (for Team Results)</label>
        <input type="text" id="adminTokenInput" value="${escapeHtml(store.settings.adminToken||'')}" placeholder="Matches ADMIN_TOKEN on the server">
      </div>
      <label class="radio-row" style="max-width:420px;">
        <input type="checkbox" id="adaptiveToggle" ${store.settings.adaptiveMode?'checked':''}>
        <div><div class="radio-title">Use adaptive questions</div>
        <div class="radio-sub">On by default whenever a backend is connected — each question is generated live from prior answers. If the backend or model is ever unavailable, it silently falls back to the standard question set, so nothing gets stuck. Turn this off only if you want to force the standard scripted set regardless.</div></div>
      </label>
    </div>
    <div class="card">
      <h3>Data</h3>
      <div class="info-sub" style="margin-bottom:12px;">${store.sessions.length} session${store.sessions.length===1?'':'s'} stored in this browser's local storage.</div>
      <button class="btn btn-danger" id="clearBtn">${ICON.trash} Clear all data</button>
    </div>`;
}
function wireSettingsView(){
  document.getElementById('nameInput').addEventListener('input', e=>{
    store.settings.name = e.target.value; saveStore(store);
    document.getElementById('avatarBadge').textContent = (e.target.value||'R').trim().charAt(0).toUpperCase() || 'R';
  });
  document.getElementById('privacySelect').addEventListener('change', e=>{
    store.settings.defaultPrivacy = e.target.value; saveStore(store);
  });
  document.getElementById('backendUrlInput').addEventListener('input', e=>{
    store.settings.backendUrl = e.target.value.trim(); saveStore(store);
  });
  document.getElementById('adminTokenInput').addEventListener('input', e=>{
    store.settings.adminToken = e.target.value.trim(); saveStore(store);
  });
  document.getElementById('adaptiveToggle').addEventListener('change', e=>{
    store.settings.adaptiveMode = e.target.checked; saveStore(store);
    if(e.target.checked && !store.settings.backendUrl){
      toast('Set a Backend URL above for adaptive questions to actually work.');
    }
  });
  document.getElementById('clearBtn').addEventListener('click', ()=>{
    if(!confirm('This deletes all saved sessions and settings from this browser. Continue?')) return;
    localStorage.removeItem(STORE_KEY); localStorage.removeItem(DRAFT_KEY);
    store = loadStore(); draftAvailable=false; state=defaultState();
    toast('All data cleared.'); render();
  });
}

/* ============================= INIT ============================= */
render();
</script>
</body>
